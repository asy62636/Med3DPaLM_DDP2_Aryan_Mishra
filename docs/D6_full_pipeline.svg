<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8"/>
    </marker>
  </defs>

  <!-- ═══════════ INPUT ═══════════ -->
  <rect x="10" y="152" width="80" height="84" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="50" y="176" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">3D Medical</text>
  <text x="50" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#334155">Image</text>
  <text x="50" y="210" text-anchor="middle" font-size="8.5" fill="#64748b">CT / MRI</text>
  <text x="50" y="224" text-anchor="middle" font-size="7.5" fill="#64748b">1×128×256×256</text>

  <!-- Arrow: Input → DCFormer -->
  <line x1="90" y1="194" x2="132" y2="194" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════ DCFORMER (VISION ENCODER) ═══════════ -->
  <rect x="136" y="68" width="138" height="252" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="205" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#991b1b">DCFormer</text>
  <text x="205" y="112" text-anchor="middle" font-size="9.5" fill="#b91c1c">3D Swin-UNETR</text>
  <text x="205" y="128" text-anchor="middle" font-size="9" fill="#b91c1c">❄ frozen · ~62M params</text>

  <!-- Feature pyramid hint -->
  <text x="205" y="150" text-anchor="middle" font-size="8" fill="#6b7280" font-style="italic">5-Stage Feature Pyramid</text>

  <!-- S3 bar (low-level features) -->
  <rect x="152" y="162" width="106" height="26" rx="4" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="205" y="179" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1d4ed8">S3: 256t × 384D</text>
  <text x="205" y="200" text-anchor="middle" font-size="7" fill="#6b7280">(low-level: fine detail)</text>

  <!-- S4 bar (high-level features) -->
  <rect x="152" y="212" width="106" height="26" rx="4" fill="#93c5fd" stroke="#2563eb" stroke-width="1.2"/>
  <text x="205" y="229" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1d4ed8">S4: 32t × 768D</text>
  <text x="205" y="250" text-anchor="middle" font-size="7" fill="#6b7280">(high-level: semantics)</text>

  <!-- Mini pyramid (simplified S0-S2) -->
  <rect x="167" y="265" width="76" height="8" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="175" y="275" width="60" height="8" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="183" y="285" width="44" height="8" rx="2" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="205" y="305" text-anchor="middle" font-size="6.5" fill="#94a3b8">S0–S2 (unused)</text>

  <!-- ═══════════ ARROWS: DCFormer → ParGo branches ═══════════ -->
  <!-- S3 → Low-Level Branch (curve up-right) -->
  <path d="M 258 175 C 300 175, 310 134, 354 134" stroke="#475569" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <!-- S4 → High-Level Branch (curve down-right) -->
  <path d="M 258 225 C 300 225, 310 266, 354 266" stroke="#475569" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>

  <!-- ═══════════ MULTI-SCALE DECOMPOSED 3D PARGO ═══════════ -->
  <rect x="342" y="18" width="252" height="360" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>

  <!-- Title -->
  <text x="448" y="44" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">Multi-Scale Decomposed</text>
  <text x="448" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#14532d">3D ParGo</text>
  <text x="448" y="77" text-anchor="middle" font-size="9" fill="#166534">🔥 trainable · ~700M params</text>

  <!-- ── LOW-LEVEL BRANCH (Stage 3 features) ── -->
  <rect x="356" y="92" width="178" height="84" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="445" y="111" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">Low-Level Branch</text>
  <text x="445" y="128" text-anchor="middle" font-size="8.5" fill="#15803d">256t × 384D → 144t × 3584D</text>
  <!-- 3-view mini icons -->
  <rect x="383" y="139" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="396" y="150" text-anchor="middle" font-size="6.5" fill="#166534">Ax</text>
  <rect x="412" y="139" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="425" y="150" text-anchor="middle" font-size="6.5" fill="#166534">Cor</text>
  <rect x="441" y="139" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="454" y="150" text-anchor="middle" font-size="6.5" fill="#166534">Sag</text>
  <text x="481" y="150" font-size="7" fill="#6b7280">× 6L</text>
  <text x="445" y="170" text-anchor="middle" font-size="7" fill="#6b7280" font-style="italic">~451M params</text>

  <!-- ── HIGH-LEVEL BRANCH (Stage 4 features) ── -->
  <rect x="356" y="224" width="178" height="84" rx="6" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="445" y="243" text-anchor="middle" font-size="10" font-weight="bold" fill="#166534">High-Level Branch</text>
  <text x="445" y="260" text-anchor="middle" font-size="8.5" fill="#15803d">32t × 768D → 32t × 3584D</text>
  <!-- 3-view mini icons -->
  <rect x="383" y="271" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="396" y="282" text-anchor="middle" font-size="6.5" fill="#166534">Ax</text>
  <rect x="412" y="271" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="425" y="282" text-anchor="middle" font-size="6.5" fill="#166534">Cor</text>
  <rect x="441" y="271" width="26" height="15" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.7"/>
  <text x="454" y="282" text-anchor="middle" font-size="6.5" fill="#166534">Sag</text>
  <text x="481" y="282" font-size="7" fill="#6b7280">× 6L</text>
  <text x="445" y="302" text-anchor="middle" font-size="7" fill="#6b7280" font-style="italic">~258M params</text>

  <!-- ── CONCATENATION ── -->
  <!-- Line: Low Branch right → Concat circle -->
  <line x1="534" y1="134" x2="548" y2="189" stroke="#22c55e" stroke-width="1.5"/>
  <text x="547" y="153" font-size="7" fill="#166534" font-weight="bold">144t</text>

  <!-- Line: High Branch right → Concat circle -->
  <line x1="534" y1="266" x2="548" y2="211" stroke="#22c55e" stroke-width="1.5"/>
  <text x="547" y="253" font-size="7" fill="#166534" font-weight="bold">32t</text>

  <!-- Concat symbol (circle) -->
  <circle cx="562" cy="200" r="13" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="562" y="204" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532d">C</text>

  <!-- Line from concat to box edge -->
  <line x1="575" y1="200" x2="594" y2="200" stroke="#16a34a" stroke-width="1.5"/>

  <!-- Total output annotation -->
  <text x="448" y="358" text-anchor="middle" font-size="9" font-weight="bold" fill="#14532d">Output: 176 tokens × 3584D</text>

  <!-- ═══════════ ARROW: ParGo → LLM ═══════════ -->
  <line x1="594" y1="200" x2="646" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="620" y="192" text-anchor="middle" font-size="7.5" fill="#475569">176t</text>
  <text x="620" y="216" text-anchor="middle" font-size="7" fill="#475569">× 3584D</text>

  <!-- ═══════════ LLM ═══════════ -->
  <rect x="650" y="125" width="148" height="150" rx="8" fill="#6b7280" stroke="#374151" stroke-width="2"/>
  <text x="724" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="white">Qwen 2.5-7B</text>
  <text x="724" y="173" text-anchor="middle" font-size="10" fill="white">Instruct</text>
  <text x="724" y="196" text-anchor="middle" font-size="9" fill="#d1d5db">~7B params</text>
  <text x="724" y="214" text-anchor="middle" font-size="9" fill="#d1d5db">🔥 LoRA fine-tuned</text>
  <text x="724" y="228" text-anchor="middle" font-size="8" fill="#d1d5db">(Stage 3 only)</text>
  <text x="724" y="250" text-anchor="middle" font-size="8" fill="#9ca3af">❄ frozen in Stage 2</text>

  <!-- ═══════════ TEXT TOKENIZER ═══════════ -->
  <rect x="670" y="318" width="108" height="36" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="724" y="335" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">Text Tokenizer</text>
  <text x="724" y="348" text-anchor="middle" font-size="7.5" fill="#3b82f6">Qwen Tokenizer</text>

  <!-- Text input label -->
  <text x="724" y="370" text-anchor="middle" font-size="7.5" fill="#64748b" font-style="italic">"Describe this scan..."</text>

  <!-- Arrow: Text Tokenizer → LLM (entering from below) -->
  <line x1="724" y1="318" x2="724" y2="277" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="746" y="298" font-size="7" fill="#3b82f6">text tokens</text>

  <!-- ═══════════ ARROW: LLM → Output ═══════════ -->
  <line x1="798" y1="200" x2="836" y2="200" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══════════ OUTPUT ═══════════ -->
  <rect x="840" y="160" width="56" height="78" rx="6" fill="#1f2937" stroke="#111827" stroke-width="1.5"/>
  <text x="868" y="186" text-anchor="middle" font-size="8" font-weight="bold" fill="white">Medical</text>
  <text x="868" y="198" text-anchor="middle" font-size="8" font-weight="bold" fill="white">Report /</text>
  <text x="868" y="210" text-anchor="middle" font-size="8" font-weight="bold" fill="white">VQA</text>
  <text x="868" y="222" text-anchor="middle" font-size="8" font-weight="bold" fill="white">Answer</text>

  <!-- ═══════════ TRAINING STAGE LEGEND ═══════════ -->
  <text x="15" y="395" font-size="7.5" fill="#6b7280">❄ = frozen (all stages)     🔥 = trainable: Stage 2 → projector only  |  Stage 3 → projector + LLM (LoRA)</text>

</svg>
